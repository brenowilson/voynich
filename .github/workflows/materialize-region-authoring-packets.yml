name: Materialize region authoring packets

on:
  push:
    branches:
      - feature/region-authoring-packets
    paths:
      - ".github/workflows/materialize-region-authoring-packets.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONPATH: src

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/region-authoring-packets
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate packet bundle
        run: |
          rm -rf corpus/pilots/PILOT-0001/region-authoring-packets
          python scripts/build_region_authoring_packets.py \
            --trial-manifest corpus/pilots/PILOT-0001/region-annotation-trial/manifest.json \
            --repository-root . \
            --output-root corpus/pilots/PILOT-0001/region-authoring-packets
      - name: Commit packet bundle
        run: |
          git config user.name "voynich-authoring-bot"
          git config user.email "voynich-authoring-bot@users.noreply.github.com"
          git add corpus/pilots/PILOT-0001/region-authoring-packets
          if ! git diff --cached --quiet; then
            git commit -m "data: materialize region authoring packets"
            git push origin HEAD:feature/region-authoring-packets
          fi
