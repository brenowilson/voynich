name: Validate observation primitives

on:
  pull_request:
    paths:
      - "docs/protocols/observation-primitives.md"
      - "docs/protocols/observation-work-queue.md"
      - "schemas/observation-package.schema.json"
      - "schemas/observation-event.schema.json"
      - "schemas/observation-work-queue.schema.json"
      - "src/voynich/observation/**"
      - "scripts/build_blank_observation_package.py"
      - "scripts/build_observation_work_queue.py"
      - "tests/unit/test_observation_model.py"
      - "tests/unit/test_observation_work_queue.py"
      - "corpus/templates/observation-package.example.json"
      - "corpus/pilots/PILOT-0001/candidates.jsonl"
      - "corpus/pilots/PILOT-0001/candidate-freeze.json"
      - "corpus/pilots/PILOT-0001/observation-work-queue/**"
      - ".github/workflows/validate-observation-primitives.yml"
  push:
    branches: [main]
    paths:
      - "docs/protocols/observation-primitives.md"
      - "docs/protocols/observation-work-queue.md"
      - "schemas/observation-package.schema.json"
      - "schemas/observation-event.schema.json"
      - "schemas/observation-work-queue.schema.json"
      - "src/voynich/observation/**"
      - "scripts/build_blank_observation_package.py"
      - "scripts/build_observation_work_queue.py"
      - "tests/unit/test_observation_model.py"
      - "tests/unit/test_observation_work_queue.py"
      - "corpus/templates/observation-package.example.json"
      - "corpus/pilots/PILOT-0001/candidates.jsonl"
      - "corpus/pilots/PILOT-0001/candidate-freeze.json"
      - "corpus/pilots/PILOT-0001/observation-work-queue/**"
      - ".github/workflows/validate-observation-primitives.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONPATH: src

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install validation dependencies
        run: python -m pip install pytest jsonschema

      - name: Run observation unit tests
        run: >-
          pytest -q
          tests/unit/test_observation_model.py
          tests/unit/test_observation_work_queue.py

      - name: Regenerate observation outputs
        run: |
          python scripts/build_blank_observation_package.py \
            --pages sources/primary/manifests/pages.jsonl \
            --panel-id YDC-PANEL-1006094 \
            --output /tmp/observation-package.example.json
          python scripts/build_observation_work_queue.py \
            --candidates corpus/pilots/PILOT-0001/candidates.jsonl \
            --pages sources/primary/manifests/pages.jsonl \
            --candidate-freeze corpus/pilots/PILOT-0001/candidate-freeze.json \
            --output-root /tmp/observation-work-queue \
            --batch-count 5

      - name: Validate committed and regenerated outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator, FormatChecker
          from voynich.observation.model import read_jsonl, validate_package
          from voynich.observation.work_queue import validate_work_queue

          def load(path):
              return json.loads(Path(path).read_text(encoding="utf-8"))

          checker = FormatChecker()
          package_schema = load("schemas/observation-package.schema.json")
          event_schema = load("schemas/observation-event.schema.json")
          queue_schema = load("schemas/observation-work-queue.schema.json")
          for schema in (package_schema, event_schema, queue_schema):
              Draft202012Validator.check_schema(schema)

          committed_example = load("corpus/templates/observation-package.example.json")
          regenerated_example = load("/tmp/observation-package.example.json")
          if committed_example != regenerated_example:
              raise SystemExit("blank observation example is not deterministic")

          committed_root = Path("corpus/pilots/PILOT-0001/observation-work-queue")
          regenerated_root = Path("/tmp/observation-work-queue")
          committed_manifest = load(committed_root / "manifest.json")
          regenerated_manifest = load(regenerated_root / "manifest.json")
          if committed_manifest != regenerated_manifest:
              raise SystemExit("committed work-queue manifest differs from regeneration")

          package_validator = Draft202012Validator(package_schema, format_checker=checker)
          queue_validator = Draft202012Validator(queue_schema, format_checker=checker)
          queue_errors = list(queue_validator.iter_errors(committed_manifest))
          if queue_errors:
              raise SystemExit("; ".join(error.message for error in queue_errors[:10]))

          committed_paths = sorted((committed_root / "packages").glob("*.json"))
          regenerated_paths = sorted((regenerated_root / "packages").glob("*.json"))
          if len(committed_paths) != 25 or len(regenerated_paths) != 25:
              raise SystemExit(
                  f"expected 25 packages; committed={len(committed_paths)}, regenerated={len(regenerated_paths)}"
              )
          if [path.name for path in committed_paths] != [path.name for path in regenerated_paths]:
              raise SystemExit("committed and regenerated package filenames differ")

          packages = {}
          for committed_path, regenerated_path in zip(committed_paths, regenerated_paths):
              committed = load(committed_path)
              regenerated = load(regenerated_path)
              if committed != regenerated:
                  raise SystemExit(f"{committed_path} differs from deterministic regeneration")
              errors = list(package_validator.iter_errors(committed))
              if errors:
                  raise SystemExit(f"{committed_path}: {errors[0].message}")
              validate_package(committed)
              repo_path = committed_path.as_posix()
              packages[repo_path] = committed

          candidates = read_jsonl(Path("corpus/pilots/PILOT-0001/candidates.jsonl"))
          pages = read_jsonl(Path("sources/primary/manifests/pages.jsonl"))
          candidate_freeze = load("corpus/pilots/PILOT-0001/candidate-freeze.json")
          summary = validate_work_queue(
              manifest=committed_manifest,
              packages=packages,
              candidates=candidates,
              pages=pages,
              candidate_freeze=candidate_freeze,
          )
          if summary["package_count"] != 25:
              raise SystemExit("work-queue validator did not confirm 25 packages")
          if sorted(summary["batch_sizes"].values()) != [5, 5, 5, 5, 5]:
              raise SystemExit(f"unexpected batch sizes: {summary['batch_sizes']}")
          PY
