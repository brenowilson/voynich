name: Validate observation primitives

on:
  pull_request:
    paths:
      - ".github/workflows/validate-observation-primitives.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONPATH: src

jobs:
  materialize-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data/materialize-observation-work-queue
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install pytest jsonschema

      - name: Run observation tests
        run: >-
          pytest -q
          tests/unit/test_observation_model.py
          tests/unit/test_observation_work_queue.py

      - name: Materialize canonical work queue
        run: |
          rm -rf corpus/pilots/PILOT-0001/observation-work-queue
          python scripts/build_observation_work_queue.py \
            --candidates corpus/pilots/PILOT-0001/candidates.jsonl \
            --pages sources/primary/manifests/pages.jsonl \
            --candidate-freeze corpus/pilots/PILOT-0001/candidate-freeze.json \
            --output-root corpus/pilots/PILOT-0001/observation-work-queue \
            --batch-count 5

      - name: Validate materialized outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator, FormatChecker
          from voynich.observation.model import validate_package

          manifest_schema = json.loads(Path("schemas/observation-work-queue.schema.json").read_text())
          package_schema = json.loads(Path("schemas/observation-package.schema.json").read_text())
          manifest = json.loads(Path("corpus/pilots/PILOT-0001/observation-work-queue/manifest.json").read_text())
          checker = FormatChecker()
          errors = list(Draft202012Validator(manifest_schema, format_checker=checker).iter_errors(manifest))
          if errors:
              raise SystemExit("; ".join(error.message for error in errors[:10]))
          package_validator = Draft202012Validator(package_schema, format_checker=checker)
          package_paths = sorted(Path("corpus/pilots/PILOT-0001/observation-work-queue/packages").glob("*.json"))
          if len(package_paths) != 25:
              raise SystemExit(f"expected 25 packages, found {len(package_paths)}")
          for path in package_paths:
              package = json.loads(path.read_text())
              package_errors = list(package_validator.iter_errors(package))
              if package_errors:
                  raise SystemExit(f"{path}: {package_errors[0].message}")
              validate_package(package)
          batch_sizes = {}
          for entry in manifest["entries"]:
              batch_sizes[entry["batch_id"]] = batch_sizes.get(entry["batch_id"], 0) + 1
          if sorted(batch_sizes.values()) != [5, 5, 5, 5, 5]:
              raise SystemExit(f"unexpected batch sizes: {batch_sizes}")
          PY

      - uses: EndBug/add-and-commit@v9
        with:
          add: corpus/pilots/PILOT-0001/observation-work-queue
          message: data: materialize observation work queue
          push: true
