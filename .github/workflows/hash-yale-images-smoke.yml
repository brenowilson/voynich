name: Hash Yale image bytes smoke

on:
  push:
    branches: [main]
    paths:
      - "src/voynich/acquisition/byte_store.py"
      - "src/voynich/acquisition/freeze.py"
      - "scripts/acquire_image_bytes.py"
      - "scripts/build_source_freeze.py"
      - "tests/unit/test_image_byte_freeze.py"
      - ".github/workflows/hash-yale-images-smoke.yml"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: src
      MANIFEST_SHA256: c1f12b6ad256b91e1b5c8015c2107de1c2ff24e573f4524c53e8f4004bccfc23
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pytest
      - run: pytest -q tests/unit/test_image_byte_freeze.py
      - name: Hash two Yale images
        run: |
          mkdir -p reports/generated/byte-smoke .external-store
          python scripts/acquire_image_bytes.py \
            --assets sources/primary/yale/assets.jsonl \
            --output reports/generated/byte-smoke/records.jsonl \
            --store-root .external-store \
            --manifest-sha256 "$MANIFEST_SHA256" \
            --limit 2 \
            --discard-bytes
      - uses: actions/upload-artifact@v4
        with:
          name: yale-byte-smoke
          path: reports/generated/byte-smoke/records.jsonl
