name: Validate Yale source and page manifest

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/acquire_yale.py"
      - "scripts/build_page_manifest.py"
      - "scripts/build_canonical_page_manifest.py"
      - "src/voynich/acquisition/**"
      - "schemas/page-manifest.schema.json"
      - "tests/unit/test_yale_acquisition.py"
      - "tests/unit/test_asset_side_relations.py"
      - "tests/unit/test_canonical_page_manifest.py"
      - "sources/primary/yale/source-record.json"
      - "sources/primary/yale/rights.json"
      - "sources/primary/yale/image-byte-records-stored.jsonl"
      - ".github/workflows/acquire-yale.yml"
  pull_request:
    paths:
      - "scripts/acquire_yale.py"
      - "scripts/build_page_manifest.py"
      - "scripts/build_canonical_page_manifest.py"
      - "src/voynich/acquisition/**"
      - "schemas/page-manifest.schema.json"
      - "tests/unit/test_yale_acquisition.py"
      - "tests/unit/test_asset_side_relations.py"
      - "tests/unit/test_canonical_page_manifest.py"
      - "sources/primary/yale/source-record.json"
      - "sources/primary/yale/rights.json"
      - "sources/primary/yale/image-byte-records-stored.jsonl"
      - ".github/workflows/acquire-yale.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install validation dependencies
        run: python -m pip install pytest jsonschema

      - name: Test acquisition and manifest builders
        run: >-
          pytest -q
          tests/unit/test_yale_acquisition.py
          tests/unit/test_asset_side_relations.py
          tests/unit/test_canonical_page_manifest.py

      - name: Acquire official IIIF manifest into ephemeral worktree
        run: >-
          python scripts/acquire_yale.py
          --manifest-url https://collections.library.yale.edu/manifests/2002046.json
          --output-root .

      - name: Build explicit asset-to-side relation tables
        run: >-
          python scripts/build_page_manifest.py
          --assets sources/primary/yale/assets.jsonl
          --output-dir sources/primary/manifests

      - name: Build canonical page manifest
        run: >-
          python scripts/build_canonical_page_manifest.py
          --assets sources/primary/yale/assets.jsonl
          --byte-records sources/primary/yale/image-byte-records-stored.jsonl
          --relations sources/primary/manifests/asset-side-relations.csv
          --composites sources/primary/manifests/foldouts.csv
          --rights sources/primary/yale/rights.json
          --jsonl-output sources/primary/manifests/pages.jsonl
          --csv-output sources/primary/manifests/pages.csv

      - name: Validate canonical records and schema
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator, FormatChecker

          schema = json.loads(Path("schemas/page-manifest.schema.json").read_text())
          validator = Draft202012Validator(schema, format_checker=FormatChecker())
          records = [
              json.loads(line)
              for line in Path("sources/primary/manifests/pages.jsonl").read_text().splitlines()
              if line.strip()
          ]
          if len(records) != 213:
              raise SystemExit(f"expected 213 page records, found {len(records)}")
          errors = [error for record in records for error in validator.iter_errors(record)]
          if errors:
              raise SystemExit("; ".join(error.message for error in errors[:10]))
          support = sum(record["record_type"] == "support_view" for record in records)
          composites = sum(record["composition_status"] == "composite_candidate" for record in records)
          if support != 9:
              raise SystemExit(f"expected 9 support views, found {support}")
          if composites != 21:
              raise SystemExit(f"expected 21 composite candidates, found {composites}")
          if any(record["reading_order"] is not None for record in records):
              raise SystemExit("manifest contains an unsupported reading-order claim")
          PY
          python -m json.tool sources/primary/yale/collection.json >/dev/null
          python -m json.tool sources/primary/yale/manifest.json >/dev/null
          python -m json.tool sources/primary/yale/rights.json >/dev/null
          test -s sources/primary/manifests/pages.csv
          test -s sources/primary/manifests/asset-side-relations.csv
          test -s sources/primary/manifests/foldouts.csv
          test -s sources/primary/manifests/non-folio-assets.csv

      - name: Upload validation snapshot
        uses: actions/upload-artifact@v4
        with:
          name: canonical-page-manifest
          path: |
            sources/primary/manifests/pages.jsonl
            sources/primary/manifests/pages.csv
            sources/primary/manifests/asset-side-relations.csv
            sources/primary/manifests/foldouts.csv
            sources/primary/manifests/non-folio-assets.csv
            sources/primary/yale/collection.json
            sources/primary/yale/manifest.json
            sources/primary/yale/assets.jsonl
            sources/primary/yale/rights.json

      - name: Confirm frozen source was not committed by CI
        run: |
          echo "Validation is read-only. Upstream snapshots are artifacts only and never pushed automatically."
