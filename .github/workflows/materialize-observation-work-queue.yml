name: Materialize observation work queue

on:
  push:
    branches:
      - feature/observation-work-queue
    paths:
      - ".github/workflows/materialize-observation-work-queue.yml"
      - "src/voynich/observation/work_queue.py"
      - "scripts/build_observation_work_queue.py"
      - "tests/unit/test_observation_work_queue.py"
      - "schemas/observation-work-queue.schema.json"
  pull_request:
    paths:
      - ".github/workflows/materialize-observation-work-queue.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONPATH: src

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/observation-work-queue
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pytest jsonschema
      - run: pytest -q tests/unit/test_observation_model.py tests/unit/test_observation_work_queue.py
      - run: python scripts/build_observation_work_queue.py --output-root corpus/pilots/PILOT-0001/observation-work-queue
      - uses: EndBug/add-and-commit@v9
        with:
          add: corpus/pilots/PILOT-0001/observation-work-queue
          message: data: materialize PILOT-0001 observation work queue
          push: true
