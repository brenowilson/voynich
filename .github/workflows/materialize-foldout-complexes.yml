name: Materialize page and foldout manifests

on:
  push:
    paths:
      - ".github/workflows/materialize-foldout-complexes.yml"
  pull_request:
    paths:
      - ".github/workflows/materialize-foldout-complexes.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONPATH: src

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/foldout-complexes
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install validation dependencies
        run: python -m pip install pytest jsonschema
      - name: Run page and foldout unit tests
        run: >-
          pytest -q
          tests/unit/test_canonical_page_manifest.py
          tests/unit/test_foldout_complexes.py
      - name: Regenerate canonical page manifest
        run: |
          python scripts/build_canonical_page_manifest.py \
            --assets sources/primary/yale/assets.jsonl \
            --byte-records sources/primary/yale/image-byte-records-stored.jsonl \
            --relations sources/primary/manifests/asset-side-relations.csv \
            --composites sources/primary/manifests/foldouts.csv \
            --rights sources/primary/yale/rights.json \
            --jsonl-output sources/primary/manifests/pages.jsonl \
            --csv-output sources/primary/manifests/pages.csv
      - name: Regenerate foldout complex outputs
        run: |
          python scripts/build_foldout_complexes.py \
            --pages sources/primary/manifests/pages.jsonl \
            --codicology sources/primary/yale/foldout-codicology.json \
            --complexes-output sources/primary/manifests/foldout-complexes.jsonl \
            --relations-output sources/primary/manifests/foldout-panel-relations.csv
      - name: Validate generated records
        run: |
          python - <<'PY'
          import csv
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator, FormatChecker

          checker = FormatChecker()
          page_schema = json.loads(Path("schemas/page-manifest.schema.json").read_text())
          foldout_schema = json.loads(Path("schemas/foldout-complex.schema.json").read_text())
          pages = [
              json.loads(line)
              for line in Path("sources/primary/manifests/pages.jsonl").read_text().splitlines()
              if line.strip()
          ]
          complexes = [
              json.loads(line)
              for line in Path("sources/primary/manifests/foldout-complexes.jsonl").read_text().splitlines()
              if line.strip()
          ]
          relations = list(csv.DictReader(Path("sources/primary/manifests/foldout-panel-relations.csv").open()))

          page_validator = Draft202012Validator(page_schema, format_checker=checker)
          foldout_validator = Draft202012Validator(foldout_schema, format_checker=checker)
          errors = [error for record in pages for error in page_validator.iter_errors(record)]
          errors += [error for record in complexes for error in foldout_validator.iter_errors(record)]
          if errors:
              raise SystemExit("; ".join(error.message for error in errors[:10]))
          if len(pages) != 213:
              raise SystemExit(f"expected 213 page records, found {len(pages)}")
          if any(record["source_filename"] is not None for record in pages):
              raise SystemExit("source filename must remain null when Yale supplies none")
          if any(record["acquisition_status"] != "verified" for record in pages):
              raise SystemExit("all page records must be verified")
          if len(complexes) != 7:
              raise SystemExit(f"expected 7 complexes, found {len(complexes)}")
          if len(relations) != 40:
              raise SystemExit(f"expected 40 panel relations, found {len(relations)}")
          if sum(record["folding_leaf_count"] for record in complexes) != 10:
              raise SystemExit("expected 10 physical folding-leaf slots")
          if sum(record["label_candidate_panel_count"] for record in complexes) != 21:
              raise SystemExit("expected all 21 label-derived candidates")
          assigned = [row for row in relations if row["physical_leaf_id"]]
          if len(assigned) != 4:
              raise SystemExit(f"expected 4 explicitly assigned 85-86 panels, found {len(assigned)}")
          if any(row["reading_order"] for row in relations):
              raise SystemExit("reading order must remain empty")
          PY
      - name: Commit deterministic outputs
        run: |
          git config user.name "voynich-source-bot"
          git config user.email "voynich-source-bot@users.noreply.github.com"
          git add sources/primary/manifests/pages.jsonl \
                  sources/primary/manifests/pages.csv \
                  sources/primary/manifests/foldout-complexes.jsonl \
                  sources/primary/manifests/foldout-panel-relations.csv
          if ! git diff --cached --quiet; then
            git commit -m "data: regenerate canonical page and foldout manifests"
            git push origin HEAD:feature/foldout-complexes
          fi
